name: CloudOS-RL CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md'

jobs:
  backend-tests:
    name: Backend — Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements*.txt', 'Dockerfile') }}-v2

      # 🔥 CRITICAL FIX — Kafka requires system lib
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            librdkafka-dev \
            build-essential

      # Core backend deps
      - name: Install core Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi \
            uvicorn \
            pyyaml \
            pydantic \
            pydantic-settings \
            "python-jose[cryptography]" \
            numpy==1.26.4 \
            scipy \
            joblib \
            requests \
            httpx \
            boto3 \
            prometheus-client

      # 🔥 FIX — pytest-timeout required for --timeout flag
      - name: Install test dependencies
        run: |
          pip install \
            pytest \
            pytest-cov \
            pytest-timeout

      # Kafka client
      - name: Install Kafka client
        run: |
          pip install confluent-kafka

      # ML stack
      - name: Install ML dependencies (CPU-only torch for CI speed)
        run: |
          pip install torch==2.3.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu
          pip install \
            stable-baselines3==2.3.0 \
            gymnasium==0.29.1

      # SHAP
      - name: Install SHAP
        run: |
          pip install "shap==0.46.0" || pip install shap

      # 🔍 Validate environment before tests
      - name: Verify critical imports
        run: |
          python -c "import fastapi; print('fastapi OK')"
          python -c "import confluent_kafka; print('confluent_kafka OK')"
          python -c "import torch; print('torch OK')"
          python -c "import stable_baselines3; print('stable_baselines3 OK')"
          python -c "from jose import jwt; print('jose OK')"
        env:
          PYTHONPATH: .

      # 🔐 Auth sanity check
      - name: Run auth smoke test
        run: |
          python -c "
          from backend.auth.security import create_token, _decode_token
          from backend.auth.models import Role
          token = create_token('test', Role.engineer)
          payload = _decode_token(token)
          assert payload.sub == 'test'
          assert payload.role == Role.engineer
          print('Auth smoke test: PASS')
          "
        env:
          PYTHONPATH: .
          CLOUDOS_AUTH_REQUIRED: "false"

      # 🧪 Run tests
      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --no-cov \
            -v \
            --tb=short \
            --timeout=120 \
            -m "not k8s and not kafka and not network" \
            -x
        env:
          CLOUDOS_AUTH_REQUIRED: "false"
          PYTHONPATH: .

  frontend-check:
    name: Frontend — Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cloudos-ui/package-lock.json

      - name: Install dependencies
        working-directory: cloudos-ui
        run: npm ci

      - name: Build
        working-directory: cloudos-ui
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8001
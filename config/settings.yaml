app:
  name: CloudOS-RL
  version: 1.0.0
  debug: false

model:
  path: /app/models/best_model.zip
  vecnorm: /app/models/vec_normalize.pkl

api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"

training:
  n_envs: 4
  total_timesteps: 2000000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  model_save_dir: models
  max_episode_steps: 1000

environment:
  max_episode_steps: 1000
  pricing_normalization: 10.0
  carbon_normalization: 600.0
  latency_normalization: 1000.0
  pricing_fallback_path: data/pricing/aws_pricing.json

reward_weights:
  alpha: 0.35
  beta: 0.25
  gamma: 0.20
  delta: 0.15
  epsilon: 0.05

# =============================================================================
# Data Pipeline (Module G)
# =============================================================================
data_pipeline:
  pricing_refresh_sec: 3600
  carbon_refresh_sec: 900
  cur_refresh_sec: 3600
  pricing_output_path: data/pricing/aws_pricing.json
  actual_costs_output_path: data/pricing/aws_actual_costs.json
  carbon_output_path: data/carbon/carbon_intensity.json
  anomaly_threshold_pct: 50.0

kafka:
  bootstrap_servers: "192.168.49.1:9092"
  partitions: 3
  replication: 1
  group_id: cloudos-rl-k8s
  topics:
    decisions: cloudos.scheduling.decisions
    metrics: cloudos.metrics
    alerts: cloudos.alerts
    workload: cloudos.workload.events

# =============================================================================
# Prometheus (Module D)
# =============================================================================
prometheus:
  host: 0.0.0.0
  port: 9090

# =============================================================================
# Kafka → Prometheus Bridge (Module D)
# =============================================================================
bridge:
  poll_timeout_seconds: 1.0
  max_messages_per_poll: 100
  pipeline_metrics_push_interval: 30
  decision_window_seconds: 60

aws:
  region: us-east-1

logging:
  level: INFO
# =============================================================================
# CloudOS-RL Docker Compose Stack
# =============================================================================
# Services included:
#   prometheus      — scrapes bridge at :9090, exposes query API at :9091
#   grafana-docker  — optional Grafana at :3001
#
# Services deliberately NOT in Docker (already running natively on Windows):
#   kafka       — native / separate runtime
#   zookeeper   — native / separate runtime
#   bridge      — native via:
#                 python -m ai_engine.kafka.kafka_prometheus_bridge
#
# Usage:
#   docker compose up -d prometheus
#   docker compose --profile docker-grafana up -d
#   docker compose down
#   docker compose logs -f prometheus
#
# After starting:
#   Prometheus UI:  http://localhost:9091
#   Grafana:        http://localhost:3001   (Docker profile only)
#   Native Grafana: http://localhost:3000   (if already installed on Windows)
#   Bridge metrics: http://localhost:9090/metrics
# =============================================================================

networks:
  cloudos-net:
    name: cloudos-net
    driver: bridge

volumes:
  prometheus-data:
    name: cloudos-prometheus-data
  grafana-data:
    name: cloudos-grafana-data

services:
  # ===========================================================================
  # Prometheus — Time Series Database + Query API
  # ===========================================================================
  # Scrapes the native bridge at host.docker.internal:9090
  # Exposes full PromQL query API at :9091
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: cloudos-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
      - "--web.listen-address=0.0.0.0:9090"
      - "--web.external-url=http://localhost:9091"
      - "--log.level=warn"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cloudos-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Grafana — Optional Docker Dashboard Service
  # ===========================================================================
  # Starts only with:
  #   docker compose --profile docker-grafana up -d
  #
  # Uses port 3001 to avoid conflict with native Grafana at 3000.
  # ===========================================================================
  grafana-docker:
    image: grafana/grafana:10.2.0
    container_name: cloudos-grafana-docker
    restart: unless-stopped
    profiles:
      - docker-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/grafana_provisioning.yaml:/etc/grafana/provisioning/datasources/cloudos.yaml:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: cloudos123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_SERVER_HTTP_PORT: "3000"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/cloudos_dashboard.json
      GF_LOG_LEVEL: warn
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cloudos-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
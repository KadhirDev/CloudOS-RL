[coverage:run]
source          = ai_engine
omit            =
    */tests/*
    */__pycache__/*
    */migrations/*
    ai_engine/training/*
    ai_engine/explainability/shap_explainer.py

branch          = True
parallel        = False

[coverage:report]
exclude_lines   =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    \.\.\.
    pass
show_missing    = True
skip_covered    = False
precision       = 1

[coverage:html]
directory       = reports/coverage_html
title           = CloudOS-RL Coverage Report
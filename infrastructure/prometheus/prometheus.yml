# =============================================================================
# Prometheus Configuration — CloudOS-RL
# =============================================================================
# Scrapes the Kafka-Prometheus bridge at localhost:9090/metrics every 10s.
# Prometheus itself runs in Docker on container port :9090 and is exposed on
# host port :9091.
#
# Grafana datasource must point to http://localhost:9091 (host), not 9090.
# =============================================================================

global:
  scrape_interval: 10s
  evaluation_interval: 10s
  scrape_timeout: 8s

  external_labels:
    monitor: "cloudos-rl"
    env: "development"

# Alert rules
rule_files:
  - "alerts.yml"

# Alertmanager (optional — comment out if not running)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['localhost:9093']

# =============================================================================
# Scrape configs
# =============================================================================
scrape_configs:

  # ── CloudOS-RL Bridge / Exporter ─────────────────────────────────────────
  # This is the kafka_prometheus_bridge running on the host at :9090/metrics
  # It exposes all cloudos_* metrics.
  - job_name: "cloudos-bridge"
    scrape_interval: 10s
    static_configs:
      - targets:
          - "host.docker.internal:9090"
        labels:
          service: "kafka-prometheus-bridge"
          module: "D"
    metrics_path: /metrics
    scheme: http
    metric_relabel_configs:
      # Keep only cloudos_* and python/process metrics
      - source_labels: [__name__]
        regex: "cloudos_.*|python_.*|process_.*"
        action: keep

  # ── CloudOS-RL Kafka Consumer Metrics ────────────────────────────────────
  # Standalone metrics consumer running on the host at :9094/metrics
  - job_name: "cloudos-consumer"
    scrape_interval: 10s
    static_configs:
      - targets:
          - "host.docker.internal:9094"
        labels:
          service: "kafka-consumer"
          module: "streaming"
    metrics_path: /metrics
    scheme: http

  # ── CloudOS-RL FastAPI Backend ────────────────────────────────────────────
  # Uncomment when Module C/H (API) is running with a reachable /metrics endpoint
  # - job_name: "cloudos-api"
  #   scrape_interval: 15s
  #   static_configs:
  #     - targets:
  #         - "host.docker.internal:8001"
  #   metrics_path: /metrics
  #   scheme: http

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  # Inside the Prometheus container, Prometheus listens on port 9090.
  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          service: "prometheus"
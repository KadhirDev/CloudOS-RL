# =============================================================================
# CloudOS-RL FastAPI Backend Deployment
# Uses pre-built cloudos-api image — no pip install at startup.
# Build image first: .\scripts\build_images.ps1
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudos-api
  namespace: cloudos-rl
  labels:
    app.kubernetes.io/name: cloudos-rl
    app.kubernetes.io/component: api
    app: cloudos-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudos-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloudos-api
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cloudos-operator

      initContainers:
        - name: wait-for-bridge
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for cloudos-bridge-svc:9090 ..."
              until wget -qO- http://cloudos-bridge-svc:9090/metrics > /dev/null 2>&1; do
                echo "  Not ready — retrying in 5s"
                sleep 5
              done
              echo "Bridge ready."

      containers:
        - name: api
          image: cloudos-api:latest
          imagePullPolicy: Never

          command:
            - python
            - -m
            - uvicorn
            - backend.api.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --workers
            - "1"
            - --log-level
            - info

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: CLOUDOS_KAFKA_BOOTSTRAP
              valueFrom:
                configMapKeyRef:
                  name: cloudos-config
                  key: CLOUDOS_KAFKA_BOOTSTRAP
            - name: CLOUDOS_MODEL_PATH
              value: "/app/models/best_model.zip"
            - name: CLOUDOS_VECNORM_PATH
              value: "/app/models/vec_normalize.pkl"
            - name: CLOUDOS_LOG_LEVEL
              value: "INFO"
            - name: PYTHONPATH
              value: "/app"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloudos-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudos-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true

          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: data-pricing
              mountPath: /app/data/pricing
            - name: data-carbon
              mountPath: /app/data/carbon
            - name: config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml

          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "3Gi"

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 18
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

      hostAliases:
        - ip: "192.168.49.1"
          hostnames:
            - "host.minikube.internal"

      volumes:
        - name: models
          hostPath:
            path: /cloudos-rl/models
            type: Directory

        - name: data-pricing
          hostPath:
            path: /cloudos-rl/data/pricing
            type: DirectoryOrCreate

        - name: data-carbon
          hostPath:
            path: /cloudos-rl/data/carbon
            type: DirectoryOrCreate

        - name: config
          configMap:
            name: cloudos-config
            items:
              - key: settings.yaml
                path: settings.yaml

---
apiVersion: v1
kind: Service
metadata:
  name: cloudos-api-svc
  namespace: cloudos-rl
  labels:
    app.kubernetes.io/name: cloudos-rl
    app.kubernetes.io/component: api
spec:
  selector:
    app: cloudos-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800
      protocol: TCP
  type: NodePort
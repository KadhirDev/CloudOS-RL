# =============================================================================
# CloudOS-RL Kafka-Prometheus Bridge Deployment
# Uses pre-built cloudos-bridge image — no pip install at startup.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudos-bridge
  namespace: cloudos-rl
  labels:
    app.kubernetes.io/name:      cloudos-rl
    app.kubernetes.io/component: bridge
    app:                         cloudos-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudos-bridge
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app:                         cloudos-bridge
        app.kubernetes.io/component: bridge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9090"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: cloudos-operator

      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka at 192.168.49.1:9092 ..."
              until nc -z host.minikube.internal 9092; do
                echo "  Not ready — retrying in 5s"
                sleep 5
              done
              echo "Kafka ready."

      containers:
        - name: bridge
          image: cloudos-bridge:latest
          imagePullPolicy: Never   # local Minikube image

          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            - name: CLOUDOS_KAFKA_BOOTSTRAP
              valueFrom:
                configMapKeyRef:
                  name: cloudos-config
                  key:  CLOUDOS_KAFKA_BOOTSTRAP
            - name: CLOUDOS_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: cloudos-config
                  key:  CLOUDOS_LOG_LEVEL
            - name: PYTHONPATH
              value: "/app"

          volumeMounts:
            - name: config
              mountPath: /app/config/settings.yaml
              subPath:   settings.yaml
            - name: data-pricing
              mountPath: /app/data/pricing
            - name: data-carbon
              mountPath: /app/data/carbon

          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          startupProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds:       5
            failureThreshold:    12   # 10 + (12×5) = 70s window

          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 20
            periodSeconds:       15
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 15
            periodSeconds:       10

      hostAliases:
        - ip: "192.168.49.1"
          hostnames:
            - "host.minikube.internal"

      volumes:
        - name: config
          configMap:
            name: cloudos-config
            items:
              - key:  settings.yaml
                path: settings.yaml

        - name: data-pricing
          hostPath:
            path: /cloudos-rl/data/pricing
            type: DirectoryOrCreate

        - name: data-carbon
          hostPath:
            path: /cloudos-rl/data/carbon
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: cloudos-bridge-svc
  namespace: cloudos-rl
  labels:
    app.kubernetes.io/name:      cloudos-rl
    app.kubernetes.io/component: bridge
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "9090"
spec:
  selector:
    app: cloudos-bridge
  ports:
    - name:       metrics
      port:       9090
      targetPort: 9090
      protocol:   TCP
  type: ClusterIP

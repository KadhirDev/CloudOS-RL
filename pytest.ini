[pytest]
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions= test_*
addopts         =
    --tb=short
    --strict-markers
    -q
    --no-header

markers =
    unit:        Pure unit tests — no I/O, no network, no subprocess
    integration: Tests that touch filesystem or subprocesses
    slow:        Tests that take >2s
    k8s:         Tests that require kubectl / Minikube
    kafka:       Tests that require a live Kafka broker
    network:     Tests that require network access

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:shap
    ignore::RuntimeWarning